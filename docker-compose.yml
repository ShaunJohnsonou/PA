# ──────────────────────────────────────────────
#  Personal Assistant (Hermes Agentic Layer)
#  Base URL: http://localhost:9119
# ──────────────────────────────────────────────

networks:
  n8n-net:
    driver: bridge

volumes:
  hermes_data:

services:
  agentic_layer:
    build:
      context: .
      dockerfile: docker_files/hermes.Dockerfile
      args:
        HERMES_BRANCH: ${HERMES_BRANCH:-custom-agent}
    image: hermes-agent:local
    container_name: personal_assistant
    restart: unless-stopped
    networks:
      - n8n-net
    ports:
      - "9119:9119"
    volumes:
      - hermes_data:/opt/data
    environment:
      HERMES_HOME: /opt/data
      HERMES_UID: ${HERMES_UID:-10000}
      HERMES_GID: ${HERMES_GID:-10000}
      GATEWAY_ALLOW_ALL_USERS: ${GATEWAY_ALLOW_ALL_USERS:-true}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_ALLOWED_USERS: ${TELEGRAM_ALLOWED_USERS:-7238643612}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      HERMES_ALLOW_ROOT_GATEWAY: 1
    command: [ "hermes", "gateway", "run" ]
